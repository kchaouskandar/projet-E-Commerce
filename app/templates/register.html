{% extends "base.html" %}
{% block title %}Créer un Compte — ShopSense{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-card__logo">
      <span>🛒 ShopSense</span>
      <p>Créez votre compte gratuitement</p>
    </div>

    <form method="POST" action="{{ url_for('main.register') }}" id="register-form">

      <div class="form-group">
        <label for="name">Nom Complet</label>
        <input
          class="form-control"
          type="text"
          id="name"
          name="name"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Adresse E-mail</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="exemple@domaine.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de Passe</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmer le Mot de Passe</label>
        <input
          class="form-control"
          type="password"
          id="confirm_password"
          name="confirm_password"
          required
          autocomplete="new-password"
        />
      </div>

      <br />
      <button type="submit" class="btn btn-primary btn-full" id="register-submit">
        🚀 Créer mon Compte
      </button>

    </form>

    <p class="auth-footer">
      Vous avez déjà un compte ?
      <a href="{{ url_for('main.login') }}">Se connecter</a>
    </p>

  </div>
</div>
{% endblock %}
